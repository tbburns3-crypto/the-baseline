<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | The Baseline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a1a0e;
      color: #e8f5e9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    .brand {
      color: #00e676;
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 3px;
      text-decoration: none;
      margin-bottom: 40px;
      display: block;
    }
    .card {
      background: #172c1c;
      border: 1px solid #1f3a28;
      border-radius: 14px;
      padding: 40px 36px;
      max-width: 480px;
      width: 100%;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 10px;
      color: #e8f5e9;
    }
    .sub {
      color: #6abf7b;
      font-size: .9rem;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .contact-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #112016;
      border: 1px solid #1f3a28;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 14px;
      text-decoration: none;
      color: inherit;
      transition: border-color .15s, background .15s;
    }
    .contact-row:hover { border-color: #00e676; background: #0f2215; }
    .contact-row:last-child { margin-bottom: 0; }
    .cr-icon { font-size: 1.4rem; flex-shrink: 0; }
    .cr-body { flex: 1; }
    .cr-label { font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; color: #4a7c59; margin-bottom: 3px; }
    .cr-value { font-size: .95rem; font-weight: 600; color: #e8f5e9; }
    .cr-arrow { color: #4a7c59; font-size: 1rem; }
    .back {
      margin-top: 28px;
      color: #4a7c59;
      font-size: .85rem;
      text-decoration: none;
    }
    .back:hover { color: #00e676; }
    .note {
      margin-top: 24px;
      padding: 14px 18px;
      background: #0a1a0e;
      border-radius: 8px;
      font-size: .8rem;
      color: #4a7c59;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <a href="/" class="brand">&#9679; THE BASELINE</a>

  <div class="card">
    <h1>Get in Touch</h1>
    <p class="sub">Questions about picks, your subscription, or anything else — reach out directly.</p>

    <a href="mailto:tbburns3@gmail.com?subject=The Baseline - Support" class="contact-row">
      <span class="cr-icon">&#9993;</span>
      <div class="cr-body">
        <div class="cr-label">Email</div>
        <div class="cr-value">tbburns3@gmail.com</div>
      </div>
      <span class="cr-arrow">&#8250;</span>
    </a>

    <div class="note">
      For subscription billing issues, include the email address you used to sign in and we'll get back to you as soon as possible.
    </div>
  </div>

  <a href="/" class="back">&#8592; Back to The Baseline</a>

</body>
</html>
